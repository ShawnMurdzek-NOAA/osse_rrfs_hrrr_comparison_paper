sfc_pt:
  TMP:
    plot_stat: 'RMSE'
    kwargs: &tmp_sfc_kwargs
      file_prefix: 'point_stat'
      line_type: 'sl1l2'
      ci: True
      ci_lvl: 0.95
      ci_opt: 't_dist'
      ci_kw:
        acct_lag_corr: True
      diff_kw: &tmp_sfc_diff
        var: ['RMSE']
        pct: True
        match: 
          - 'FCST_LEAD'
          - 'FCST_VAR'
          - 'FCST_VALID_BEG'
          - 'FCST_LEV'
          - 'FCST_UNITS'
          - 'VX_MASK'
          - 'OBTYPE'
      mean_legend: False
      toggle_pts: False
      plot_param:
        OBTYPE: 'ADPSFC'
        FCST_LEV: 'Z2'
        FCST_VAR: 'TMP'
  SPFH:
    plot_stat: 'RMSE'
    kwargs:
      <<: *tmp_sfc_kwargs
      plot_param:
        OBTYPE: 'ADPSFC'
        FCST_LEV: 'Z2'
        FCST_VAR: 'SPFH'
  UGRD_VGRD:
    plot_stat: 'VECT_RMSE'
    kwargs:
      <<: *tmp_sfc_kwargs
      line_type: 'vl1l2'
      diff_kw:
        <<: *tmp_sfc_diff
        var: ['VECT_RMSE']
      plot_param:
        OBTYPE: 'ADPSFC'
        FCST_LEV: 'Z10'
        FCST_VAR: 'UGRD_VGRD'

